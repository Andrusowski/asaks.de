{{ define "main" }}
<div class="w-full max-w-5xl mx-auto p-4">
    <div class="border-4 border-retro-text p-1 shadow-[8px_8px_0px_0px_rgba(211,63,73,1)] bg-retro-bg">
        <div class="border-2 border-retro-text p-8 min-h-[500px]">
            
            <header class="mb-12 border-b-2 border-retro-accent pb-4">
                <h1 class="text-4xl font-bold uppercase tracking-wider text-retro-accent">{{ .Title }}</h1>
            </header>

            <!-- Markdown Content -->
            <article class="retro-content">
                {{ .Content }}
            </article>

            <div class="space-y-16">
                <!-- Professional Projects -->
                <section>
                    <h2 class="text-3xl uppercase mb-8 flex items-center">
                        <span class="text-retro-accent mr-4">#</span> Professional Work
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {{ range .Params.professional_projects }}
                        {{ partial "project-card.html" . }}
                        {{ end }}
                    </div>
                </section>

                <!-- Hobby Projects -->
                <section>
                    <h2 class="text-3xl uppercase mb-8 flex items-center">
                        <span class="text-retro-accent mr-4">#</span> Hobby Projects
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {{ range .Params.hobby_projects }}
                        {{ partial "project-card.html" . }}
                        {{ end }}
                    </div>
                </section>
            </div>
        </div>
    </div>
</div>
{{ end }}
