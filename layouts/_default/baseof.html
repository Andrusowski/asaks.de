<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    {{ $style := resources.Get "css/main.css" | css.PostCSS }}
    <link rel="stylesheet" href="{{ $style.Permalink }}">
</head>
<body class="bg-retro-bg text-retro-text min-h-screen flex flex-col font-sans antialiased selection:bg-retro-accent selection:text-white">
    
    <!-- Navigation -->
    <header class="p-6">
        <nav>
            <ul class="flex flex-wrap gap-2 text-xl uppercase tracking-widest">
                <li>
                    <a href="/" class="hover:text-retro-accent transition-colors duration-200">[ Home ]</a>
                </li>
                <li>
                    <a href="/about" class="hover:text-retro-accent transition-colors duration-200">[ About ]</a>
                </li>
                <li>
                    <a href="/portfolio" class="hover:text-retro-accent transition-colors duration-200">[ Portfolio ]</a>
                </li>
                <li>
                    <a href="/tools" class="hover:text-retro-accent transition-colors duration-200">[ Tools ]</a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4">
        {{ block "main" . }}{{ end }}
    </main>

    <!-- Footer -->
    <footer class="p-6 text-center text-sm uppercase tracking-widest opacity-60">
        <a href="/privacy" class="hover:text-retro-accent transition-colors duration-200 mr-4">[ Privacy ]</a>
        <a href="/legal" class="hover:text-retro-accent transition-colors duration-200">[ Legal ]</a>
    </footer>

    <script async src="https://ackee.gymir.andrus.io/cooltrack.js" data-ackee-server="https://ackee.gymir.andrus.io" data-ackee-domain-id="77afd078-7888-4e35-90bd-36d608363672"></script>

</body>
</html>
