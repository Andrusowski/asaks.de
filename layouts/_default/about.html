{{ define "main" }}
<div class="w-full max-w-4xl mx-auto p-4">
    <div class="border-4 border-retro-text p-1 shadow-[8px_8px_0px_0px_rgba(211,63,73,1)] bg-retro-bg">
        <div class="border-2 border-retro-text p-8 min-h-[500px] flex flex-col items-center">
            
            <!-- Avatar Section -->
            {{ with .Params.avatar }}
            <div class="mb-8 relative group">
                <div class="w-48 h-48 rounded-full overflow-hidden border-4 border-retro-accent shadow-[0px_0px_15px_rgba(211,63,73,0.5)] transition-transform duration-300 transform group-hover:scale-105">
                    <img src="{{ . }}" alt="Avatar" class="w-full h-full object-cover">
                </div>
                <!-- Retro glitch decoration -->
                <div class="absolute -inset-1 rounded-full border border-retro-text opacity-30 animate-pulse"></div>
            </div>
            {{ end }}

            <header class="mb-8 text-center border-b-2 border-retro-accent pb-4 w-full">
                <h1 class="text-4xl font-bold uppercase tracking-wider text-retro-accent">{{ .Title }}</h1>
            </header>
            
            <article class="retro-content w-full">
                {{ .Content }}
            </article>
        </div>
    </div>
</div>
{{ end }}
