{{ define "main" }}
<div class="w-full max-w-4xl mx-auto p-4">
    <div class="border-4 border-retro-text p-1 shadow-[8px_8px_0px_0px_rgba(211,63,73,1)] bg-retro-bg">
        <div class="border-2 border-retro-text p-8 min-h-[500px]">
            <header class="mb-8 border-b-2 border-retro-accent pb-4">
                <h1 class="text-4xl font-bold uppercase tracking-wider text-retro-accent">{{ .Title }}</h1>
                <div class="text-gray-400 mt-2 font-mono text-sm">
                    // LAST_UPDATED: {{ .Date.Format "2006-01-02" }}
                </div>
            </header>
            
            <article class="retro-content">
                {{ .Content }}
            </article>
        </div>
    </div>
</div>
{{ end }}
