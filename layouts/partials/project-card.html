<a href="{{ .url }}" target="_blank" rel="noopener noreferrer" 
   class="group relative block h-48 border-2 border-retro-text bg-retro-bg overflow-hidden transition-all duration-300 hover:border-retro-accent hover:shadow-[4px_4px_0px_0px_rgba(211,63,73,1)]">
    
    <!-- Background Decoration -->
    <div class="absolute inset-0 opacity-10 group-hover:opacity-20 transition-opacity pointer-events-none">
        <div class="absolute inset-0 bg-[radial-gradient(#FCF7F8_1px,transparent_1px)] [background-size:16px_16px]"></div>
    </div>

    <!-- Content Wrapper -->
    <div class="relative h-full p-6 flex flex-col justify-center items-center text-center">
        
        <!-- Project Name -->
        <h3 class="text-4xl font-bold uppercase tracking-widest transition-all duration-500 ease-in-out
                   group-hover:text-xl group-hover:absolute group-hover:top-4 group-hover:text-retro-accent">
            {{ .name }}
        </h3>

        <!-- Description -->
        <div class="opacity-0 translate-y-4 transition-all duration-500 ease-in-out 
                    group-hover:opacity-100 group-hover:translate-y-0 mt-4">
            <p class="text-gray-300 text-xl leading-tight">
                {{ .description }}
            </p>
            <span class="inline-block mt-2 text-retro-accent animate-pulse">>>></span>
        </div>

    </div>
</a>
