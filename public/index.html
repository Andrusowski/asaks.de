<script>
    document.addEventListener('DOMContentLoaded', () => {
        const gifUrls = [
            
                "\/images\/vibe\/1.gif",
            
                "\/images\/vibe\/2.gif",
            
                "\/images\/vibe\/3.gif",
            
                "\/images\/vibe\/4.gif",
            
                "\/images\/vibe\/5.gif",
            
                "\/images\/vibe\/6.gif",
            
                "\/images\/vibe\/7.gif",
            
                "\/images\/vibe\/8.gif",
            
        ];

        const gifContainer = document.getElementById('pool-gif-container');
        
        if (gifContainer && gifUrls.length > 0) {
            
            const now = new Date();
            const seed = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
            
            
            const index = seed % gifUrls.length;
            const selectedGif = gifUrls[index];
            
            const img = document.createElement('img');
            img.src = selectedGif;
            img.alt = "Today's Vibe";
            img.className = "w-full h-full object-contain grayscale hover:grayscale-0 transition-all duration-500";
            
            gifContainer.innerHTML = '';
            gifContainer.appendChild(img);
        }
    });
</script>
